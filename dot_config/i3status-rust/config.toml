icons_format = "{icon}"

[theme]
theme = "gruvbox-dark"

[icons]
icons = "none"

[[block]]
block = "custom"
command = "aw.sh 4 daily"
json = true
interval = 60

[[block]]
block = "custom"
command = "aw.sh 4 weekly"
json = true
interval = 60

[[block]]
block = "cpu"
info_cpu = 20
warning_cpu = 50
critical_cpu = 90

[[block]]
block = "disk_space"
path = "/"
info_type = "available"
alert_unit = "GB"
interval = 20
warning = 20.0
alert = 10.0
format = " $icon root: $available.eng(w:2) "

[[block]]
block = "memory"
format = " $icon $mem_total_used_percents.eng(w:2) "
format_alt = " $icon_swap $swap_used_percents.eng(w:2) "

[[block]]
block = "sound"
[[block.click]]
button = "left"
cmd = "pavucontrol"

[[block]]
block = "battery"
warning = 30
critical = 15

[[block]]
block = "time"
interval = 5
format = " $timestamp.datetime(f:'%a %m/%d %R') "
